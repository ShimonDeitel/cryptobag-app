name: Cryptobag
options:
  bundleIdPrefix: com.shimondeitel.cryptobag
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Cryptobag:
    type: application
    platform: iOS
    sources:
      - path: Cryptobag
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cryptobag
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cryptobag/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CryptobagTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CryptobagTests
      - path: Cryptobag.storekit
    dependencies:
      - target: Cryptobag
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cryptobag.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CryptobagUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CryptobagUITests
    dependencies:
      - target: Cryptobag
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cryptobag.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Cryptobag:
    build:
      targets:
        Cryptobag: all
        CryptobagTests: [test]
        CryptobagUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Cryptobag.storekit
    test:
      config: Debug
      storeKitConfiguration: Cryptobag.storekit
      targets:
        - CryptobagTests
        - CryptobagUITests
    archive:
      config: Release
